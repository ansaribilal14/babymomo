name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build debug APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: babymomo-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Babymomo Build #${{ github.run_number }}
          body: |
            🧠 **Babymomo - Private AI Companion**
            
            One AI. One memory. One brain. Forever.
            
            Build: `v1.0.0-build-${{ github.run_number }}`
            Commit: `${{ github.sha }}`
            
            **Features:**
            - Streaming chat with LLM provider chain
            - Bi-temporal memory system (4 types)
            - Agent system (5 specialist agents)
            - Skills & Tools execution
            - Interactive AI-generated screens
            - Linux sandbox (proot Alpine)
            - Heartbeat autonomous checks
            - MCP server support
            - SQLCipher encrypted storage
            - On-device LiteRT models
            
            Download the APK below 👇
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
